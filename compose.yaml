services:
    proxy:
        image: caddy:2-alpine
        container_name: mentisetterna-proxy
        restart: unless-stopped
        depends_on:
            - mentis
        ports:
            - "${MENTIS_HTTP_PORT:-8080}:80"
            - "${MENTIS_HTTPS_PORT:-8443}:443"
        environment:
            PUBLIC_BASE_URL: "${PUBLIC_BASE_URL:-http://localhost:8080}"
            PROXY_BASIC_AUTH_USERNAME: "${PROXY_BASIC_AUTH_USERNAME:-}"
            PROXY_BASIC_AUTH_PASSWORD: "${PROXY_BASIC_AUTH_PASSWORD:-}"
            MAX_UPLOAD_BYTES: "${MAX_UPLOAD_BYTES:-67108864}"
        volumes:
            - ./proxy/entrypoint.sh:/usr/local/bin/mentis-proxy-entrypoint.sh:ro
            - mentis-caddy-data:/data
            - mentis-caddy-config:/config
        entrypoint:
            - /bin/sh
            - /usr/local/bin/mentis-proxy-entrypoint.sh

    mentis:
        build:
            context: .
        image: mentisetterna:latest
        container_name: mentisetterna
        restart: unless-stopped
        expose:
            - "8080"
        environment:
            ADDR: ":8080"
            PUBLIC_BASE_URL: "${PUBLIC_BASE_URL:-http://localhost:8080}"
            WEBAUTHN_RPID: "${WEBAUTHN_RPID:-}"
            WEBAUTHN_RP_ORIGINS: "${WEBAUTHN_RP_ORIGINS:-}"
            MAX_UPLOAD_BYTES: "${MAX_UPLOAD_BYTES:-67108864}"
            MAX_INLINE_UPLOAD_BYTES: "${MAX_INLINE_UPLOAD_BYTES:-16777216}"
            DB_PATH: "${DB_PATH:-/data/mentis.db}"
            VEC_EXT_PATH: "${VEC_EXT_PATH:-/app/lib}"
            MEDIA_CACHE_DIR: "${MEDIA_CACHE_DIR:-/data/media-cache}"
            JOB_WORKERS: "${JOB_WORKERS:-10}"
            RECIPE_CATEGORY_WORKERS: "${RECIPE_CATEGORY_WORKERS:-10}"
            LOCALAI_BASE_URL: "${LOCALAI_BASE_URL:-}"
            LOCALAI_EMBEDDING_MODEL: "${LOCALAI_EMBEDDING_MODEL:-}"
            LOCALAI_CHAT_MODEL: "${LOCALAI_CHAT_MODEL:-}"
            LOCALAI_OCR_MODEL: "${LOCALAI_OCR_MODEL:-}"
            LOCALAI_STT_MODEL: "${LOCALAI_STT_MODEL:-}"
            MEDIA_S3_ENDPOINTS: "${MEDIA_S3_ENDPOINTS:-}"
            BACKUP_ENCRYPTION_KEY: "${BACKUP_ENCRYPTION_KEY:-}"
            THERMAL_PRINTER_USB_ID: "${THERMAL_PRINTER_USB_ID:-}"
            THERMAL_PRINTER_WRITE_CHUNK_BYTES: "${THERMAL_PRINTER_WRITE_CHUNK_BYTES:-}"
            THERMAL_PRINTER_WRITE_DELAY_MS: "${THERMAL_PRINTER_WRITE_DELAY_MS:-}"
        volumes:
            - ./mentis-data:/data
        extra_hosts:
            - "host.docker.internal:host-gateway"

volumes:
    mentis-caddy-data:
    mentis-caddy-config:
